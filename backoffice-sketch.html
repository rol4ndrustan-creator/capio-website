<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Capio Admin — Backoffice Sketch</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root {
  --bg: #F6F4ED;
  --panel: #FFFFFF;
  --line: #E7E2D6;
  --line-2: #EFEBE0;
  --ink: #0E1620;
  --ink-2: #2B3340;
  --muted: #5A6172;
  --muted-2: #8A8F9C;
  --accent: #2D4A6B;
  --accent-soft: #E4EAF1;
  --ok: #2F6A4F;
  --warn: #B8541F;
  --font: "Hanken Grotesk", -apple-system, system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; outline: none; }
a { color: inherit; text-decoration: none; }

/* — Layout shell — */
.shell {
  display: grid;
  grid-template-columns: 256px 1fr;
  min-height: 100vh;
}

/* — Sidebar — */
.sidebar {
  background: var(--ink);
  color: rgba(255,255,255,0.9);
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: sticky; top: 0; height: 100vh;
}
.sb-brand { display: flex; align-items: center; gap: 10px; padding: 4px 10px; }
.sb-brand img { height: 28px; filter: invert(1) brightness(1.8); }
.sb-section { display: flex; flex-direction: column; gap: 2px; }
.sb-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.4);
  padding: 8px 12px 6px;
}
.sb-item {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding: 9px 12px; border-radius: 8px; font-size: 14px;
  color: rgba(255,255,255,0.7);
  transition: background .15s ease, color .15s ease;
}
.sb-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.95); }
.sb-item.active { background: rgba(255,255,255,0.1); color: #fff; }
.sb-item .count {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45);
}
.sb-foot {
  margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
}
.sb-foot .av {
  width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff;
}

/* — Main content — */
.main { padding: 28px 40px 80px; }
.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; margin-bottom: 32px;
}
.crumbs {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.crumbs .now { color: var(--ink); }
.top-search {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 999px; width: 320px;
}
.top-search input {
  border: none; background: transparent; flex: 1; font-size: 13.5px;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  transition: background .15s ease;
}
.btn-primary { background: var(--ink); color: #fff; }
.btn-primary:hover { background: var(--accent); }
.btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
.btn-ghost:hover { border-color: var(--ink); }

/* — Page title — */
.page-h {
  display: flex; justify-content: space-between; align-items: flex-end; gap: 16px;
  margin-bottom: 24px;
}
.page-h h1 {
  font-size: 32px; line-height: 1.1; letter-spacing: -0.02em; margin: 0;
  font-weight: 500;
}
.page-h .sub { font-size: 14px; color: var(--muted); margin-top: 8px; max-width: 520px; }

/* — Stats row — */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-bottom: 28px;
}
.stat {
  padding: 18px 20px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 12px;
}
.stat .k {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.stat .v {
  margin-top: 6px; font-size: 28px; font-weight: 500; letter-spacing: -0.02em;
}
.stat .delta {
  margin-top: 4px; font-size: 12px; color: var(--ok); font-weight: 500;
}

/* — Table — */
.tabbar {
  display: flex; gap: 4px; margin-bottom: 18px;
  padding: 4px; background: var(--panel); border: 1px solid var(--line);
  border-radius: 999px; width: fit-content;
}
.tab {
  padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
  color: var(--muted);
}
.tab.active { background: var(--ink); color: #fff; }

.table {
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
}
.table-hd {
  display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 0.6fr 100px;
  gap: 16px; padding: 14px 22px; background: var(--bg);
  border-bottom: 1px solid var(--line);
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted);
}
.row {
  display: grid; grid-template-columns: 2.5fr 1fr 1fr 1fr 0.6fr 100px;
  gap: 16px; padding: 16px 22px; border-bottom: 1px solid var(--line-2);
  align-items: center; font-size: 13.5px;
}
.row:last-child { border-bottom: none; }
.row:hover { background: var(--bg); }
.row .title { font-weight: 500; color: var(--ink); }
.row .client { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
.row .pill {
  display: inline-block; padding: 3px 10px; border-radius: 999px;
  font-size: 11.5px; font-weight: 500;
}
.pill-pub { background: #E4EFE9; color: var(--ok); }
.pill-draft { background: #FBEFE3; color: var(--warn); }
.pill-sched { background: var(--accent-soft); color: var(--accent); }
.row .acts { display: flex; gap: 6px; justify-content: flex-end; }
.icon-btn {
  width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--line);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted);
}
.icon-btn:hover { color: var(--ink); border-color: var(--ink); }

/* — Two-column edit view — */
.editor {
  display: grid; grid-template-columns: 1fr 320px; gap: 20px;
  background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
  padding: 0;
}
.editor-main { padding: 28px 32px; border-right: 1px solid var(--line); }
.editor-side { padding: 28px 24px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.field label {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--muted); font-weight: 500;
}
.field input, .field textarea, .field select {
  padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
  font-size: 13.5px; background: var(--bg);
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--ink); background: #fff; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.tag-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 999px; font-size: 11.5px;
  background: var(--bg); border: 1px solid var(--line);
  color: var(--ink-2);
}
.tag-pill .x { color: var(--muted); cursor: pointer; }

.uploader {
  border: 1.5px dashed var(--line); border-radius: 10px; padding: 24px;
  text-align: center; color: var(--muted); background: var(--bg);
}
.uploader strong { color: var(--ink); }

/* — Side panel groups — */
.side-card {
  padding: 18px 16px; border: 1px solid var(--line); border-radius: 10px;
  background: var(--bg); margin-bottom: 14px;
}
.side-card .h {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
  color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
}
.kv { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; }
.kv .k { color: var(--muted); }

.outcomes-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.outcomes-grid .o {
  padding: 10px 12px; background: var(--bg); border: 1px solid var(--line);
  border-radius: 8px;
}

/* — Toolbar above stats — */
.cta-strip {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; background: var(--accent); color: #fff;
  border-radius: 12px; margin-bottom: 24px;
  font-size: 13.5px;
}
.cta-strip .note { display: flex; align-items: center; gap: 10px; opacity: 0.95; }
.cta-strip .btn { background: rgba(255,255,255,0.15); color: #fff; padding: 6px 12px; font-size: 12.5px; }

/* — Icon — */
.ico { width: 16px; height: 16px; display: inline-block; flex-shrink: 0; }

@media (max-width: 1100px) {
  .shell { grid-template-columns: 220px 1fr; }
  .editor { grid-template-columns: 1fr; }
  .editor-main { border-right: none; border-bottom: 1px solid var(--line); }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const SVG = {
  search:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" className="ico"><circle cx="11" cy="11" r="6"/><path d="M20 20l-4-4"/></svg>,
  plus:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" className="ico"><path d="M12 5v14M5 12h14"/></svg>,
  edit:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="ico"><path d="M16 4l4 4-11 11H5v-4z"/></svg>,
  trash:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="ico"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>,
  eye:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="ico"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>,
  arrow:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="ico"><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
  cog:     <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="ico"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.6 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.6-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h.1a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v.1a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>,
  upload:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" className="ico"><path d="M12 16V4M6 10l6-6 6 6M4 20h16"/></svg>,
};

const SIDEBAR = [
  { label: "Overview", group: null, items: [
    { id: "dash", label: "Dashboard", count: null, icon: "cog" },
  ]},
  { label: "Content", group: "CONTENT", items: [
    { id: "cases",    label: "Case Studies",   count: 11 },
    { id: "products", label: "Products",       count: 7 },
    { id: "services", label: "Services",       count: 8 },
    { id: "insights", label: "Insights & News", count: 14 },
    { id: "toolkit",  label: "Toolkit Wizards", count: 8 },
  ]},
  { label: "Audience", group: "AUDIENCE", items: [
    { id: "clients", label: "Clients (Portfolio)", count: 127 },
    { id: "team",    label: "Team & Bios",         count: 12 },
    { id: "certs",   label: "Certifications",      count: 22 },
  ]},
  { label: "Engagement", group: "ENGAGEMENT", items: [
    { id: "leads",       label: "Proposal requests", count: 4 },
    { id: "subscribers", label: "Newsletter",        count: 482 },
  ]},
  { label: "System", group: "SYSTEM", items: [
    { id: "settings", label: "Settings & SEO" },
    { id: "users",    label: "Admin users", count: 5 },
  ]},
];

function App() {
  const [active, setActive] = useState("cases");
  const [tab, setTab] = useState("services");

  /* simulated dataset to match the live site */
  const services = [
    { title: "Strengthening OJK Information System (IS) Security Management.",
      client: "OJK · with World Bank", sector: "Government", year: "2024–2025", status: "Published", featured: true },
    { title: "ISO multi-standard, IT audit, pentest, and ongoing build partner.",
      client: "PT MNC Asia Holding Tbk", sector: "Conglomerate", year: "2022–present", status: "Published", featured: true },
    { title: "ISO 27001:2022 consulting, certification & Purchasing SOP refresh.",
      client: "Combiphar", sector: "Pharmaceutical", year: "2024", status: "Published", featured: true },
    { title: "Capability build & multi-stream cyber programme.",
      client: "WIKA Group", sector: "Construction · SOE", year: "2023–present", status: "Published", featured: true },
  ];
  const products = [
    { title: "Mobile banking front-end & secure auth flow.", client: "NOBU Finance", sector: "Multifinance", year: "2024", status: "Published" },
    { title: "KopLink — digital cooperative banking experience.", client: "Al Hikmah · KopLink", sector: "Cooperative", year: "2024", status: "Published" },
    { title: "Financial Supply Chain Management portal.", client: "Hi Bank", sector: "Banking", year: "2024", status: "Published" },
    { title: "MotionPaylater — paylater wallet & credit experience.", client: "MNC Motion", sector: "Fintech · BNPL", year: "2023–2024", status: "Published" },
    { title: "QRIS-integrated credit & limit management.", client: "MNC Credit", sector: "Fintech · Credit", year: "2024", status: "Published" },
    { title: "Internal audit modernisation & evidence pipeline.", client: "BCA Multifinance", sector: "Multifinance", year: "2023", status: "Published" },
    { title: "IT manpower & co-delivery partnership.", client: "IDstar", sector: "Tech Services", year: "2024", status: "Draft" },
  ];

  const rows = tab === "services" ? services : products;

  return (
    <div className="shell">
      <Sidebar active={active} setActive={setActive} />
      <div className="main">
        <TopBar active={active} />
        <CtaStrip />
        <Stats />

        <div className="page-h">
          <div>
            <h1>Case Studies</h1>
            <div className="sub">Add, edit, schedule, or unpublish case studies. Featured cases appear on the homepage and in the dark hero on the Case Studies index.</div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="btn btn-ghost">{SVG.upload} Import CSV</button>
            <button className="btn btn-primary">{SVG.plus} New case study</button>
          </div>
        </div>

        <div className="tabbar">
          <button className={"tab" + (tab === "services" ? " active" : "")} onClick={() => setTab("services")}>
            Services · {services.length}
          </button>
          <button className={"tab" + (tab === "products" ? " active" : "")} onClick={() => setTab("products")}>
            Products · {products.length}
          </button>
          <button className="tab">Drafts · 2</button>
          <button className="tab">Archived · 0</button>
        </div>

        <div className="table">
          <div className="table-hd">
            <div>Title / Client</div>
            <div>Sector</div>
            <div>Year</div>
            <div>Status</div>
            <div>Feat.</div>
            <div style={{ textAlign: "right" }}>Actions</div>
          </div>
          {rows.map((r, i) => <Row key={i} r={r} />)}
        </div>

        <Editor />
      </div>
    </div>
  );
}

function Sidebar({ active, setActive }) {
  return (
    <div className="sidebar">
      <div className="sb-brand">
        <img src="assets/capio-logo.png" alt="Capio"/>
        <div style={{ marginLeft: 4, lineHeight: 1 }}>
          <div style={{ color: "#fff", fontWeight: 600, fontSize: 14 }}>Capio Admin</div>
          <div style={{ fontFamily: "var(--mono)", fontSize: 10, letterSpacing: "0.08em", color: "rgba(255,255,255,0.5)", marginTop: 3 }}>BACKOFFICE</div>
        </div>
      </div>
      {SIDEBAR.map(group => (
        <div className="sb-section" key={group.label}>
          {group.group && <div className="sb-label">{group.group}</div>}
          {group.items.map(item => (
            <div key={item.id}
                 className={"sb-item" + (active === item.id ? " active" : "")}
                 onClick={() => setActive(item.id)}>
              <span>{item.label}</span>
              {item.count != null && <span className="count">{item.count}</span>}
            </div>
          ))}
        </div>
      ))}
      <div className="sb-foot">
        <div className="av">RA</div>
        <div>
          <div style={{ color: "#fff", fontSize: 13, fontWeight: 500 }}>Reza Adipraja</div>
          <div style={{ fontSize: 11.5, color: "rgba(255,255,255,0.55)" }}>Editor · Admin</div>
        </div>
      </div>
    </div>
  );
}

function TopBar() {
  return (
    <div className="top-bar">
      <div className="crumbs">
        <span>Capio Admin</span>
        <span>›</span>
        <span>Content</span>
        <span>›</span>
        <span className="now">Case Studies</span>
      </div>
      <div className="top-search">
        {SVG.search}
        <input placeholder="Search across cases, clients, articles…"/>
      </div>
    </div>
  );
}

function CtaStrip() {
  return (
    <div className="cta-strip">
      <div className="note">
        <span style={{ fontFamily: "var(--mono)", fontSize: 11, letterSpacing: "0.08em", padding: "2px 8px", background: "rgba(255,255,255,0.18)", borderRadius: 4 }}>NEW</span>
        <span>You have <strong>4 proposal requests</strong> waiting in the inbox — last one 12 minutes ago.</span>
      </div>
      <button className="btn">View inbox {SVG.arrow}</button>
    </div>
  );
}

function Stats() {
  return (
    <div className="stats">
      <div className="stat">
        <div className="k">Published cases</div>
        <div className="v">11</div>
        <div className="delta">+2 this month</div>
      </div>
      <div className="stat">
        <div className="k">Clients in portfolio</div>
        <div className="v">127</div>
        <div className="delta">+4 this month</div>
      </div>
      <div className="stat">
        <div className="k">Insights published</div>
        <div className="v">14</div>
        <div className="delta">+1 this month</div>
      </div>
      <div className="stat">
        <div className="k">Proposal requests · 30d</div>
        <div className="v">23</div>
        <div className="delta">+19% vs prev</div>
      </div>
    </div>
  );
}

function Row({ r }) {
  const pillCls = r.status === "Published" ? "pill-pub" :
                  r.status === "Draft"     ? "pill-draft" : "pill-sched";
  return (
    <div className="row">
      <div>
        <div className="title">{r.title}</div>
        <div className="client">{r.client}</div>
      </div>
      <div style={{ color: "var(--ink-2)" }}>{r.sector}</div>
      <div style={{ fontFamily: "var(--mono)", fontSize: 12.5, color: "var(--ink-2)", letterSpacing: "0.02em" }}>{r.year}</div>
      <div><span className={"pill " + pillCls}>{r.status}</span></div>
      <div style={{ color: r.featured ? "var(--accent)" : "var(--muted)" }}>
        {r.featured ? "★ Featured" : "—"}
      </div>
      <div className="acts">
        <button className="icon-btn" title="Preview">{SVG.eye}</button>
        <button className="icon-btn" title="Edit">{SVG.edit}</button>
        <button className="icon-btn" title="Delete">{SVG.trash}</button>
      </div>
    </div>
  );
}

function Editor() {
